<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Evolving Geography of Canada (1667–2001)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a0e17;
            color: #e0e0e0;
            overflow: hidden;
        }

        #map-container {
            width: 100%;
            height: 100vh;
            position: relative;
        }
        svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .graticule {
            fill: none;
            stroke: rgba(255,255,255,0.06);
            stroke-width: 0.5;
        }
        .outline {
            fill: none;
            stroke: rgba(255,255,255,0.15);
            stroke-width: 1;
        }

        .region {
            stroke: rgba(255,255,255,0.35);
            stroke-width: 0.5;
            cursor: pointer;
            transition: fill-opacity 0.15s;
        }
        .region:hover {
            fill-opacity: 0.85 !important;
            stroke: rgba(255,255,255,0.7);
            stroke-width: 1.2;
        }

        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(10, 14, 23, 0.92);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            min-width: 600px;
            max-width: 90vw;
        }

        #year-display {
            font-size: 2.2em;
            font-weight: 700;
            color: #fff;
            min-width: 90px;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }

        #timeline-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        #timeline {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255,255,255,0.15);
            outline: none;
            cursor: pointer;
        }
        #timeline::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #4fc3f7;
            border: 2px solid #fff;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(79,195,247,0.5);
        }
        #timeline::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #4fc3f7;
            border: 2px solid #fff;
            cursor: pointer;
        }

        #tick-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.65em;
            color: rgba(255,255,255,0.4);
            padding: 0 2px;
        }

        .btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1em;
            transition: background 0.2s;
        }
        .btn:hover { background: rgba(79,195,247,0.3); }
        .btn.active { background: rgba(79,195,247,0.5); border-color: #4fc3f7; }

        #event-banner {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(10, 14, 23, 0.92);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(79,195,247,0.3);
            border-radius: 10px;
            padding: 12px 20px;
            max-width: 600px;
            text-align: center;
            transition: opacity 0.4s;
            opacity: 0;
            pointer-events: none;
        }
        #event-banner.visible {
            opacity: 1;
            pointer-events: auto;
        }
        #event-banner h3 {
            color: #4fc3f7;
            font-size: 0.95em;
            margin-bottom: 4px;
        }
        #event-banner p {
            font-size: 0.8em;
            color: rgba(255,255,255,0.7);
            line-height: 1.4;
        }

        #legend {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(10, 14, 23, 0.92);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 14px 16px;
            font-size: 0.8em;
        }
        #legend h4 {
            margin-bottom: 8px;
            color: #fff;
            font-size: 0.9em;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
            transition: opacity 0.3s;
        }
        .legend-swatch {
            width: 16px;
            height: 16px;
            border-radius: 3px;
            border: 1px solid rgba(255,255,255,0.2);
            flex-shrink: 0;
        }

        #title {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(10, 14, 23, 0.92);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 14px 18px;
        }
        #title h1 {
            font-size: 1.1em;
            color: #fff;
            margin-bottom: 2px;
        }
        #title p {
            font-size: 0.7em;
            color: rgba(255,255,255,0.5);
        }

        #speed-label {
            font-size: 0.7em;
            color: rgba(255,255,255,0.5);
            white-space: nowrap;
        }

        #tooltip {
            position: absolute;
            z-index: 1100;
            background: rgba(10, 14, 23, 0.95);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 0.8em;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s;
            max-width: 250px;
        }
        #tooltip.visible { opacity: 1; }
        #tooltip strong { color: #fff; }
        #tooltip em { color: rgba(255,255,255,0.6); }
        #tooltip .sov { color: #4fc3f7; font-size: 0.9em; }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2000;
            color: #4fc3f7;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div id="map-container">
        <svg id="map"></svg>
    </div>

    <div id="title">
        <h1>The Evolving Geography of Canada</h1>
        <p>Historical Atlas of Canada &middot; 1667&ndash;2001 &middot; Lambert Conformal Conic</p>
    </div>

    <div id="event-banner">
        <h3 id="event-title"></h3>
        <p id="event-desc"></p>
    </div>

    <div id="legend"></div>
    <div id="tooltip"></div>

    <div id="controls">
        <div id="year-display">1667</div>
        <button class="btn" id="btn-prev" title="Previous">&#9664;</button>
        <button class="btn" id="btn-play" title="Play/Pause">&#9654;</button>
        <button class="btn" id="btn-next" title="Next">&#9654;</button>
        <div id="timeline-container">
            <input type="range" id="timeline" min="0" max="45" value="0" step="1">
            <div id="tick-labels"></div>
        </div>
        <div>
            <button class="btn" id="btn-speed" title="Speed">1x</button>
            <div id="speed-label">speed</div>
        </div>
    </div>

    <div id="loading">Loading boundary data...</div>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script>
        // --- Sovereign color palette ---
        const SOVEREIGN_COLORS = {
            'France':               '#2962ff',
            'Britain':              '#c62828',
            'Canada':               '#d32f2f',
            'Hudsons Bay Company':  '#6a1b9a',
            'Spain':                '#ef6c00',
            'Russia':               '#1b5e20',
            'USA':                  '#1565c0',
            'Denmark':              '#00838f',
            'Mexico':               '#f9a825',
            'Indigenous':           '#4e342e',
            'Disputed':             '#757575',
        };
        const DEFAULT_COLOR = '#455a64';

        function getSovereignColor(sov) {
            return SOVEREIGN_COLORS[sov] || DEFAULT_COLOR;
        }

        // --- Projection: Lambert Conformal Conic for Canada ---
        const width = window.innerWidth;
        const height = window.innerHeight;

        const projection = d3.geoConicConformal()
            .parallels([49, 77])
            .rotate([95, 0])
            .center([0, 62])
            .scale(width * 0.85)
            .translate([width / 2, height / 2]);

        const path = d3.geoPath().projection(projection);

        const svg = d3.select('#map')
            .attr('width', width)
            .attr('height', height);

        // Zoom behavior
        const zoom = d3.zoom()
            .scaleExtent([0.5, 8])
            .on('zoom', (event) => {
                g.attr('transform', event.transform);
            });
        svg.call(zoom);

        const g = svg.append('g');

        // Graticule
        const graticule = d3.geoGraticule().step([10, 10]);
        g.append('path')
            .datum(graticule())
            .attr('class', 'graticule')
            .attr('d', path);

        // Sphere outline
        g.append('path')
            .datum({ type: 'Sphere' })
            .attr('class', 'outline')
            .attr('d', path);

        // Region group
        const regionGroup = g.append('g').attr('class', 'regions');

        // --- State ---
        let allFeatures = {};
        let changeEvents = {};
        let years = [];
        let currentIdx = 0;
        let playing = false;
        let playInterval = null;
        let speed = 1;
        const speeds = [0.5, 1, 2, 4];
        let speedIdx = 1;

        const tooltip = document.getElementById('tooltip');

        // --- Load data ---
        async function loadData() {
            try {
            document.getElementById('loading').textContent = 'Fetching boundary data...';
            const resp = await fetch('data/all_boundaries.geojson');
            if (!resp.ok) throw new Error('Fetch failed: ' + resp.status);
            document.getElementById('loading').textContent = 'Parsing data...';
            const geojson = await resp.json();

            geojson.features.forEach(f => {
                const y = f.properties.year;
                if (!allFeatures[y]) allFeatures[y] = [];
                allFeatures[y].push(f);
            });

            years = Object.keys(allFeatures).map(Number).sort((a, b) => a - b);

            try {
                const cr = await fetch('data/changes.geojson');
                const cGeo = await cr.json();
                cGeo.features.forEach(f => {
                    const y = f.properties.year;
                    if (!changeEvents[y]) changeEvents[y] = [];
                    changeEvents[y].push({
                        event: f.properties.event,
                        description: f.properties.description
                    });
                });
            } catch (e) {
                console.warn('Changes data not available:', e);
            }

            const slider = document.getElementById('timeline');
            slider.max = years.length - 1;

            const tickContainer = document.getElementById('tick-labels');
            const labelYears = [1667, 1763, 1867, 1905, 1999];
            tickContainer.innerHTML = '';
            for (const y of labelYears) {
                const span = document.createElement('span');
                span.textContent = y;
                tickContainer.appendChild(span);
            }

            document.getElementById('loading').style.display = 'none';
            showYear(0);
            buildLegend();
            } catch(err) {
                document.getElementById('loading').textContent = 'Error: ' + err.message;
                console.error(err);
            }
        }

        function showYear(idx) {
            currentIdx = idx;
            const year = years[idx];

            document.getElementById('year-display').textContent = year;
            document.getElementById('timeline').value = idx;

            const features = allFeatures[year] || [];

            const regions = regionGroup.selectAll('.region')
                .data(features, (d, i) => d.properties.name + '_' + i);

            regions.exit().remove();

            const entered = regions.enter()
                .append('path')
                .attr('class', 'region');

            entered.merge(regions)
                .attr('d', path)
                .attr('fill', d => getSovereignColor(d.properties.sovereign))
                .attr('fill-opacity', 0.6)
                .on('mousemove', function (event, d) {
                    const p = d.properties;
                    let html = `<strong>${p.name || 'Unknown'}</strong>`;
                    if (p.name_fr) html += `<br><em>${p.name_fr}</em>`;
                    if (p.sovereign) html += `<br><span class="sov">${p.sovereign}</span>`;
                    tooltip.innerHTML = html;
                    tooltip.style.left = (event.pageX + 12) + 'px';
                    tooltip.style.top = (event.pageY - 10) + 'px';
                    tooltip.classList.add('visible');
                })
                .on('mouseleave', function () {
                    tooltip.classList.remove('visible');
                });

            const banner = document.getElementById('event-banner');
            if (changeEvents[year]) {
                const events = changeEvents[year];
                const uniqueEvents = [...new Set(events.map(e => e.event))];
                document.getElementById('event-title').textContent = `${year}: ${uniqueEvents.join(' / ')}`;
                const desc = events.find(e => e.description)?.description || '';
                document.getElementById('event-desc').textContent = desc.length > 300 ? desc.slice(0, 297) + '...' : desc;
                banner.classList.add('visible');
            } else {
                banner.classList.remove('visible');
            }

            updateLegend(year);
        }

        function buildLegend() {
            const container = document.getElementById('legend');
            let html = '<h4>Sovereign Powers</h4>';
            for (const [name, color] of Object.entries(SOVEREIGN_COLORS)) {
                html += `<div class="legend-item" data-sovereign="${name}">
                    <div class="legend-swatch" style="background:${color}"></div>
                    <span>${name === 'Hudsons Bay Company' ? "Hudson's Bay Co." : name}</span>
                </div>`;
            }
            container.innerHTML = html;
        }

        function updateLegend(year) {
            const features = allFeatures[year] || [];
            const activeSovereigns = new Set(features.map(f => f.properties.sovereign).filter(Boolean));
            document.querySelectorAll('.legend-item').forEach(el => {
                const sov = el.dataset.sovereign;
                el.style.opacity = activeSovereigns.has(sov) ? '1' : '0.25';
            });
        }

        // --- Controls ---
        document.getElementById('timeline').addEventListener('input', e => {
            showYear(parseInt(e.target.value));
        });

        document.getElementById('btn-play').addEventListener('click', () => {
            playing = !playing;
            document.getElementById('btn-play').innerHTML = playing ? '&#9646;&#9646;' : '&#9654;';
            document.getElementById('btn-play').classList.toggle('active', playing);
            if (playing) {
                playInterval = setInterval(() => {
                    if (currentIdx >= years.length - 1) currentIdx = -1;
                    showYear(currentIdx + 1);
                }, 2000 / speed);
            } else {
                clearInterval(playInterval);
            }
        });

        document.getElementById('btn-prev').addEventListener('click', () => {
            if (currentIdx > 0) showYear(currentIdx - 1);
        });

        document.getElementById('btn-next').addEventListener('click', () => {
            if (currentIdx < years.length - 1) showYear(currentIdx + 1);
        });

        document.getElementById('btn-speed').addEventListener('click', () => {
            speedIdx = (speedIdx + 1) % speeds.length;
            speed = speeds[speedIdx];
            document.getElementById('btn-speed').textContent = speed + 'x';
            if (playing) {
                clearInterval(playInterval);
                playInterval = setInterval(() => {
                    if (currentIdx >= years.length - 1) currentIdx = -1;
                    showYear(currentIdx + 1);
                }, 2000 / speed);
            }
        });

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft' && currentIdx > 0) showYear(currentIdx - 1);
            if (e.key === 'ArrowRight' && currentIdx < years.length - 1) showYear(currentIdx + 1);
            if (e.key === ' ') {
                e.preventDefault();
                document.getElementById('btn-play').click();
            }
        });

        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            svg.attr('width', w).attr('height', h);
            projection.scale(w * 0.85).translate([w / 2, h / 2]);
            g.selectAll('path').attr('d', path);
        });

        loadData();
    </script>
</body>
</html>
